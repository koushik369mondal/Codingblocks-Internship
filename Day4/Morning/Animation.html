    <style>
        @keyframes mymove {
            0%{
                background-color: red;
                top: 0px;
                left: 0px;
            }
            25%{
                background-color: blue;
                top: 0px;
                left: 200px;
            }
            50%{
                background-color: green;
                top: 200px;
                left: 200px;
            }
            75%{
                background-color: yellow;
                top: 200px;
                left: 0px;
            }
            100%{
                background-color: rgb(0, 179, 255);
                top: 0px;
                left: 0px;
            }
        }
        .div1{
            height: 200px;
            width: 200px;
            background-color: red;

            animation: mymove 4s 2s infinite ease-in-out;
            position: relative;

            /* animation-timing-function: ease-in-out; */

        }
    </style>
</head>
